<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Shadow — интерактивный пульт</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:oklch(0.984 0.004 230);
    --surface:oklch(1 0 0);
    --surface-2:oklch(0.966 0.006 230);
    --border:oklch(0.905 0.008 235);
    --border-strong:oklch(0.84 0.012 235);
    --ink:oklch(0.23 0.022 258);
    --ink-2:oklch(0.39 0.02 258);
    --muted:oklch(0.49 0.016 258);
    --brand:oklch(0.45 0.10 248);
    --accent:oklch(0.52 0.11 220);
    --accent-deep:oklch(0.46 0.11 222);
    --risk:oklch(0.55 0.20 25);
    --ok:oklch(0.52 0.13 155);
    --sans:'Inter','Segoe UI',system-ui,sans-serif;
    --display:'Inter Tight','Segoe UI',system-ui,sans-serif;
    --mono:'JetBrains Mono','Consolas',ui-monospace,monospace;
    --ease:cubic-bezier(0.23,1,0.32,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);overflow:hidden;height:100vh;-webkit-font-smoothing:antialiased;font-feature-settings:"cv05","ss01"}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  a{color:inherit;text-decoration:none}

  /* header */
  header{height:60px;display:flex;align-items:center;gap:18px;padding:0 22px;border-bottom:1px solid var(--border);background:var(--surface);position:relative;z-index:5}
  .logo{display:flex;align-items:center;gap:11px;font-family:var(--display);font-weight:700;font-size:16px;letter-spacing:-0.02em}
  .mark{width:30px;height:30px;border-radius:8px;position:relative;flex:0 0 auto;background:radial-gradient(120% 120% at 30% 20%,var(--accent),var(--brand) 55%,oklch(0.34 0.085 252));box-shadow:0 6px 16px -7px oklch(0.45 0.10 248/.55),inset 0 1px 0 oklch(1 0 0/.3)}
  .mark::after{content:"";position:absolute;inset:0;border-radius:8px;background:radial-gradient(circle at 50% 47%,transparent 30%,oklch(1 0 0/.85) 32%,transparent 34%),radial-gradient(circle at 50% 47%,oklch(1 0 0/.95) 0 12%,transparent 14%)}
  .logo small{display:block;font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.04em;font-weight:400;margin-top:1px}
  .stats{display:flex;gap:9px;margin-left:auto}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:7px 14px;min-width:96px;text-align:center}
  .stat .v{font-family:var(--display);font-size:19px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
  .stat .l{font-size:9.5px;letter-spacing:.5px;color:var(--muted);margin-top:4px;text-transform:uppercase}
  .stat.scan .v{color:var(--accent-deep)}.stat.net .v{color:var(--brand)}.stat.risk .v{color:var(--risk)}
  .back{font-size:13.5px;color:var(--ink-2);display:flex;align-items:center;gap:7px;padding:8px 13px;border:1px solid var(--border-strong);border-radius:9px;transition:.15s;font-weight:500}
  .back:hover{border-color:var(--ink-2);background:var(--surface-2)}

  /* layout */
  .layout{display:grid;grid-template-columns:330px 1fr 350px;height:calc(100vh - 60px)}
  .col{overflow:hidden;display:flex;flex-direction:column;min-height:0}
  .col.left{border-right:1px solid var(--border)}
  .col.right{border-left:1px solid var(--border);background:var(--surface)}
  .col-head{padding:13px 16px 11px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex:0 0 auto}
  .col-head b{color:var(--ink);font-weight:600}
  .col-head .count{margin-left:auto;background:var(--surface-2);border:1px solid var(--border);border-radius:20px;padding:2px 9px;font-size:10px;color:var(--accent-deep);font-family:var(--mono)}

  /* feed */
  .feed{overflow-y:auto;padding:10px;flex:1 1 auto}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 13px;margin-bottom:9px;cursor:pointer;transition:transform .15s var(--ease),border-color .15s,box-shadow .15s}
  .card:hover{border-color:var(--border-strong);box-shadow:0 8px 20px -14px oklch(0.23 0.05 255/.4);transform:translateY(-1px)}
  .card.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 10px 24px -16px oklch(0.45 0.10 248/.5)}
  .card .top{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .score{font-family:var(--display);font-weight:800;font-size:16px;min-width:28px;font-variant-numeric:tabular-nums}
  .badge{font-size:9.5px;letter-spacing:.3px;padding:2px 8px;border-radius:6px;text-transform:uppercase;border:1px solid;font-weight:600;background:var(--surface)}
  .src{font-size:10px;color:var(--muted);margin-left:auto;font-family:var(--mono)}
  .card .title{font-size:13px;font-weight:650;margin-bottom:3px;line-height:1.3}
  .card .desc{font-size:11.5px;color:var(--ink-2);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
  .tag{font-size:9.5px;color:var(--accent-deep);background:oklch(0.52 0.11 220/.08);border:1px solid oklch(0.52 0.11 220/.22);border-radius:5px;padding:1px 7px}

  /* graph */
  .col.center{background:radial-gradient(800px 460px at 60% 38%,oklch(0.52 0.11 220/.045),transparent),var(--bg);position:relative}
  .graph-bar{position:absolute;top:14px;left:14px;right:14px;z-index:4;display:flex;gap:8px;align-items:center;pointer-events:none}
  .btn{pointer-events:auto;font-family:var(--sans);font-size:12.5px;font-weight:600;padding:9px 14px;border-radius:9px;cursor:pointer;border:1px solid var(--border-strong);background:var(--surface);color:var(--ink);transition:transform .15s var(--ease),border-color .15s,background .15s}
  .btn:active{transform:scale(.97)}
  .btn:hover{border-color:var(--accent);color:var(--accent-deep)}
  .btn.primary{background:var(--brand);border-color:transparent;color:#fff;box-shadow:0 8px 22px -12px oklch(0.45 0.10 248/.7)}
  .btn.primary:hover{background:oklch(0.38 0.095 250);color:#fff}
  .hint{margin-left:auto;font-size:11px;color:var(--muted);font-family:var(--mono);pointer-events:none}
  #svgwrap{position:absolute;inset:0;overflow:hidden;cursor:grab}
  #svgwrap.grabbing{cursor:grabbing}
  svg{width:100%;height:100%;display:block}
  .edge{stroke:var(--border-strong);stroke-width:1.3;transition:opacity .2s}
  .edge.leak{stroke:var(--risk);stroke-dasharray:5 4;stroke-width:1.5;opacity:.85}
  .edge.hl{stroke:var(--accent);stroke-width:2;opacity:1}
  .edge.dim{opacity:.12}
  .node{cursor:pointer}
  .node circle{transition:.15s;stroke:var(--surface);stroke-width:2.5}
  .node text{font-size:10px;fill:var(--ink-2);pointer-events:none;font-family:var(--mono)}
  .node.dim{opacity:.16}
  .node.sel circle{stroke:var(--ink);stroke-width:3}
  .node.sel text{fill:var(--ink);font-weight:600}
  .legend{position:absolute;bottom:14px;left:14px;z-index:4;display:flex;flex-wrap:wrap;gap:5px 13px;max-width:520px;font-size:10.5px;color:var(--muted);font-family:var(--mono)}
  .legend span{display:flex;align-items:center;gap:5px}
  .legend i{width:9px;height:9px;border-radius:50%;display:inline-block}

  /* right panel */
  .rpanel{overflow-y:auto;flex:1 1 auto;padding:15px}
  .empty{color:var(--muted);font-size:12.5px;text-align:center;padding:36px 16px;line-height:1.6}
  .det-h{font-family:var(--display);font-size:16px;font-weight:700;margin-bottom:3px;line-height:1.25;letter-spacing:-0.02em}
  .det-sub{font-size:10.5px;color:var(--muted);margin-bottom:12px;font-family:var(--mono)}
  .pill{display:inline-block;font-size:10.5px;padding:3px 9px;border-radius:6px;margin:0 4px 4px 0;border:1px solid var(--border-strong);background:var(--surface)}
  .raw{background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:11px;font-size:11px;line-height:1.55;color:var(--ink-2);margin:10px 0;font-family:var(--mono);white-space:pre-wrap}
  .kv{display:flex;font-size:11.5px;padding:6px 0;border-bottom:1px solid var(--border)}
  .kv .k{color:var(--muted);width:92px;flex:0 0 auto}
  .kv .vv{color:var(--ink);word-break:break-all}
  .sec{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--accent-deep);margin:16px 0 8px;font-family:var(--mono);font-weight:500}
  .scoreflag{font-family:var(--display);font-size:26px;font-weight:800;margin-bottom:2px;font-variant-numeric:tabular-nums}
  textarea{width:100%;background:var(--surface);border:1px solid var(--border-strong);border-radius:9px;color:var(--ink);font-size:11.5px;padding:11px;font-family:var(--mono);resize:vertical;min-height:74px;line-height:1.5}
  textarea:focus{outline:none;border-color:var(--accent)}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;background:var(--surface-2);border:1px solid var(--border);border-radius:7px;padding:4px 9px;margin:0 5px 5px 0}
  .chip b{color:var(--accent-deep)}
  .connlist .ci{font-size:11px;padding:7px 9px;border-radius:8px;background:var(--surface-2);border:1px solid var(--border);margin-bottom:5px;cursor:pointer;display:flex;gap:8px;align-items:center;transition:.15s}
  .connlist .ci:hover{border-color:var(--accent)}
  .note{border-radius:9px;padding:11px 13px;margin:10px 0;font-size:11.5px;line-height:1.5}
  .note.red{background:oklch(0.55 0.20 25/.07);border:1px solid oklch(0.55 0.20 25/.25)}
  .note.acc{background:oklch(0.52 0.11 220/.07);border:1px solid oklch(0.52 0.11 220/.22)}
  .note b{color:var(--ink)}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:5px}
  ::-webkit-scrollbar-track{background:transparent}

  @media (max-width:980px){.layout{grid-template-columns:1fr}.col.left,.col.right{display:none}}
</style>
</head>

function uname(u){return u.replace(/^@/,'').toLowerCase()}
function buildGraph(sigs){
  const nodes=new Map(), edges=[];
  const add=(id,label,type,risk,extra)=>{
    let n=nodes.get(id);
    if(n){n.risk=Math.max(n.risk,risk||0); if(extra)Object.assign(n,extra); return n;}
    n={id,label,type,risk:risk||0,sigs:[]}; if(extra)Object.assign(n,extra);
    nodes.set(id,n); return n;
  };
  sigs.forEach(s=>{
    const sid='sig:'+s.id;
    const sn=add(sid,s.id.toUpperCase(),'listing',s.risk_score,{cat:s.entities.product_category,signal:s});
    (s.entities.usernames||[]).forEach(u=>{const id='user:'+uname(u);const n=add(id,u,'username',s.risk_score);n.sigs.push(s.id);edges.push({source:sid,target:id,relation:'posted'});});
    (s.entities.wallets||[]).forEach(w=>{const id='wallet:'+w.address;const n=add(id,w.chain+' '+w.address.slice(0,5)+'…'+w.address.slice(-4),'wallet',s.risk_score);n.sigs.push(s.id);edges.push({source:sid,target:id,relation:'same_wallet'});});
    (s.entities.phones||[]).forEach(p=>{const id='phone:'+p;const n=add(id,p,'phone',s.risk_score);n.sigs.push(s.id);edges.push({source:sid,target:id,relation:'same_phone'});});
    (s.entities.cities||[]).forEach(c=>{const id='city:'+c.toLowerCase();const n=add(id,c,'city',0);n.sigs.push(s.id);edges.push({source:sid,target:id,relation:'located'});});
  });
  sigs.forEach(s=>{ if(s.id!=='sig-004' && (s.risk_factors||[]).some(f=>f.includes('утечку ПДн'))) edges.push({source:'sig:'+s.id,target:'sig:sig-004',relation:'references_leak',leak:true}); });
  return {nodes:[...nodes.values()],edges};
}
function clusters(sigs){
  const parent={}; const find=x=>parent[x]===x?x:(parent[x]=find(parent[x])); const union=(a,b)=>{parent[find(a)]=find(b)};
  sigs.forEach(s=>parent[s.id]=s.id);
  const key={};
  sigs.forEach(s=>{
    const ids=[].concat((s.entities.wallets||[]).map(w=>'w:'+w.address)).concat((s.entities.phones||[]).map(p=>'p:'+p)).concat((s.entities.usernames||[]).map(u=>'u:'+uname(u)));
    ids.forEach(k=>{ if(key[k])union(s.id,key[k]); else key[k]=s.id; });
  });
  const groups={}; sigs.forEach(s=>{const r=find(s.id);(groups[r]=groups[r]||[]).push(s.id)});
  return Object.values(groups).filter(g=>g.length>1);
}

const W=1180,H=860;
function layout(){
  const ns=G.nodes;
  ns.forEach((n,i)=>{const a=i*2.399; n.x=W/2+Math.cos(a)*(60+i*9%320); n.y=H/2+Math.sin(a)*(60+i*7%240); n.vx=0;n.vy=0;});

    for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){let dx=ns[i].x-ns[j].x,dy=ns[i].y-ns[j].y,d2=dx*dx+dy*dy+.01,d=Math.sqrt(d2),f=2600/d2,fx=f*dx/d,fy=f*dy/d;ns[i].vx+=fx;ns[i].vy+=fy;ns[j].vx-=fx;ns[j].vy-=fy;}
    G.edges.forEach(e=>{let a=NODE[e.source],b=NODE[e.target];if(!a||!b)return;let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)+.01,f=(d-96)*.018,fx=f*dx/d,fy=f*dy/d;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;});
    ns.forEach(n=>{n.vx+=(W/2-n.x)*.0022;n.vy+=(H/2-n.y)*.0022;n.x+=Math.max(-9,Math.min(9,n.vx));n.y+=Math.max(-9,Math.min(9,n.vy));n.vx*=.86;n.vy*=.86;n.x=Math.max(34,Math.min(W-34,n.x));n.y=Math.max(34,Math.min(H-34,n.y));});
  }
}
layout();
const ADJ={}; G.nodes.forEach(n=>ADJ[n.id]=new Set());
G.edges.forEach(e=>{if(ADJ[e.source]&&ADJ[e.target]){ADJ[e.source].add(e.target);ADJ[e.target].add(e.source);}});

const svg=document.getElementById('svg'), wrap=document.getElementById('svgwrap');
let view={x:0,y:0,k:1};
function applyView(){svg.setAttribute('viewBox',`${view.x} ${view.y} ${W/view.k} ${H/view.k}`);}
svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
function nodeRadius(n){if(n.type==='listing')return 7+(n.risk/100)*9;if(n.type==='wallet')return 11;if(n.type==='city')return 7;return 9;}
function escapeHtml(t){return t.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function render(){
  const hl=highlight; let s='';
  G.edges.forEach(e=>{const a=NODE[e.source],b=NODE[e.target];if(!a||!b)return;let cls='edge'+(e.leak?' leak':'');if(hl){cls+=(hl.has(e.source)&&hl.has(e.target))?' hl':' dim';}s+=`<line class="${cls}" x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}"></line>`;});
  G.nodes.forEach(n=>{
    const r=nodeRadius(n);
    let col=n.type==='listing'?riskCol(n.risk):(NTYPE[n.type]?.col||'#888');
    let cls='node'; if(hl&&!hl.has(n.id))cls+=' dim'; if(selected===n.id)cls+=' sel';
    const showLabel=n.type!=='listing'||n.risk>=70||(hl&&hl.has(n.id));
    const lbl=showLabel?`<text x="${n.x+r+3}" y="${n.y+3}">${escapeHtml(n.label)}</text>`:'';
    const glow=(n.type==='wallet')?`filter:drop-shadow(0 0 5px ${col}88)`:'';
    s+=`<g class="${cls}" data-id="${n.id}"><circle cx="${n.x}" cy="${n.y}" r="${r}" fill="${col}" style="${glow}"></circle>${lbl}</g>`;
  });
  svg.innerHTML=s;
  svg.querySelectorAll('.node').forEach(g=>{g.addEventListener('mousedown',startDragNode);g.addEventListener('click',()=>{if(!dragMoved)onNodeClick(g.dataset.id);});});
}
function neighborhood(id){const set=new Set([id]);(ADJ[id]||[]).forEach(x=>set.add(x));return set;}
function onNodeClick(id){const n=NODE[id];if(!n)return;selected=id;highlight=neighborhood(id);if(n.type==='listing'){renderSignalDetail(n.signal);syncFeed(n.signal.id);}else renderEntityDetail(n);render();}
function selectSignal(sigId){const id='sig:'+sigId;selected=id;highlight=neighborhood(id);renderSignalDetail(NODE[id].signal);syncFeed(sigId);render();focusNode(NODE[id]);}
function syncFeed(sigId){feed.querySelectorAll('.card').forEach(el=>el.classList.toggle('active',el.dataset.id===sigId));const a=feed.querySelector(`.card[data-id="${sigId}"]`);if(a)a.scrollIntoView({block:'nearest',behavior:'smooth'});}
function focusNode(n){view.k=1.5;view.x=n.x-(W/view.k)/2;view.y=n.y-(H/view.k)/2;applyView();}

const rpanel=document.getElementById('rpanel');
const decoderHTML=()=>`<div class="sec">🧠 Живой декодер</div><div><textarea id="dec-in" placeholder="Вставь закодированное объявление…"></textarea><button class="btn primary" id="dec-go" style="margin-top:8px;width:100%">Расшифровать →</button><div id="dec-out"></div></div>`;
function bindDecoder(){const go=document.getElementById('dec-go');if(go)go.onclick=runDecode;}
function renderSignalDetail(s){
  const c=CAT[s.entities.product_category]||{ic:"❓",ru:"?"}; const rc=riskClass(s.risk_score); const e=s.entities;
  const kv=(k,v)=>v&&v.length?`<div class="kv"><div class="k">${k}</div><div class="vv">${v}</div></div>`:'';
  const cluster=CLUSTERS.find(g=>g.includes(s.id));
  const clusterNote=cluster&&cluster.length>1?`<div class="note red">🕸️ <b>Часть выявленной сети</b> из ${cluster.length} сигналов — связаны общим кошельком / телефоном / алиасом. <span style="color:var(--accent-deep);cursor:pointer;font-weight:600" id="showcluster">Показать всю сеть →</span></div>`:'';
  rpanel.innerHTML=`<div class="scoreflag" style="color:${riskCol(s.risk_score)}">${s.risk_score}<span style="font-size:12px;color:var(--muted);font-weight:500"> / 100 риск</span></div>
    <div class="det-h">${c.ic} ${s.entities.product}</div>
    <div class="det-sub">${s.id.toUpperCase()} · ${s.source_name} · ${(s.timestamp||'').slice(0,10)}</div>
    <span class="pill" style="border-color:${riskCol(s.risk_score)};color:${riskCol(s.risk_score)}">${c.ru}</span>
    <span class="pill">conf ${Math.round(s.classification.confidence*100)}%</span>
    ${clusterNote}
    <div class="sec">Сырой текст</div><div class="raw">${escapeHtml(s.raw_text)}</div>
    <div class="sec">Расшифровка ИИ</div><div style="font-size:12px;line-height:1.55">${s.entities.slang_decoded}</div>
    <div class="sec">Извлечённые сущности</div>
    ${kv('Кошельки',e.wallets.map(w=>`<span style="color:#9a6700">${w.chain} ${w.address}</span>`).join('<br>'))}
    ${kv('Телефоны',e.phones.join(', '))}${kv('Аккаунты',e.usernames.join(', '))}${kv('Города',e.cities.join(', '))}
    ${kv('Цены',e.prices.map(p=>p.amount+' '+p.currency).join(' · '))}${kv('Закладки',e.dead_drops.join('<br>'))}
    <div class="sec">Риск-факторы</div><div>${(s.risk_factors||[]).map(f=>`<span class="pill" style="color:#9a6700">${f}</span>`).join('')}</div>
    ${decoderHTML()}`;
  const sc=document.getElementById('showcluster'); if(sc)sc.onclick=()=>showCluster(s.id); bindDecoder();
}
function renderEntityDetail(n){
  const t=NTYPE[n.type]||{ru:'Сущность',col:'#888'};
  const conn=(n.sigs||[]).map(id=>SIGNALS.find(s=>s.id===id)).filter(Boolean);
  rpanel.innerHTML=`<div class="det-h" style="color:${t.col}">${n.label}</div><div class="det-sub">${t.ru} · риск узла ${n.risk}</div>
    ${conn.length>1?`<div class="note acc">🔗 Этот идентификатор связывает <b>${conn.length}</b> сигнала(ов) — кросс-платформенный мост.</div>`:''}
    <div class="sec">Связанные сигналы (${conn.length})</div>
    <div class="connlist">${conn.sort((a,b)=>b.risk_score-a.risk_score).map(s=>{const c=CAT[s.entities.product_category]||{ic:'❓'};return `<div class="ci" data-id="${s.id}"><span class="score" style="font-size:13px;color:${riskCol(s.risk_score)}">${s.risk_score}</span><span>${c.ic} ${s.entities.product}</span><span style="margin-left:auto;color:var(--muted);font-size:10px">${s.source}</span></div>`;}).join('')}</div>
    ${decoderHTML()}`;
  rpanel.querySelectorAll('.ci').forEach(el=>el.onclick=()=>selectSignal(el.dataset.id)); bindDecoder();
}
function showCluster(seedSigId){
  const cluster=CLUSTERS.find(g=>g.includes(seedSigId))||[seedSigId];
  const set=new Set(), sigs=[];
  cluster.forEach(id=>{const sn=NODE['sig:'+id];if(!sn)return;set.add('sig:'+id);sigs.push(sn.signal);
    (sn.signal.entities.usernames||[]).forEach(u=>set.add('user:'+uname(u)));
    (sn.signal.entities.wallets||[]).forEach(w=>set.add('wallet:'+w.address));
    (sn.signal.entities.phones||[]).forEach(p=>set.add('phone:'+p));});
  if(sigs.some(s=>(s.risk_factors||[]).some(f=>f.includes('утечку')))) set.add('sig:sig-004');
  highlight=set; selected='sig:'+seedSigId; render();
  const pts=[...set].map(id=>NODE[id]).filter(Boolean);
  const minx=Math.min(...pts.map(n=>n.x))-55,maxx=Math.max(...pts.map(n=>n.x))+55,miny=Math.min(...pts.map(n=>n.y))-55,maxy=Math.max(...pts.map(n=>n.y))+55;
  const w=Math.max(150,maxx-minx),h=Math.max(150,maxy-miny);
  view.k=Math.max(.6,Math.min(2.4,Math.min(W/w,H/h))); view.x=minx-(W/view.k-w)/2; view.y=miny-(H/view.k-h)/2; applyView();
  const wallets=new Set(),phones=new Set(),aliases=new Set(),cities=new Set(); let leak=false,maxr=0;
  sigs.forEach(s=>{s.entities.wallets.forEach(w=>wallets.add(w.address));s.entities.phones.forEach(p=>phones.add(p));s.entities.usernames.forEach(u=>aliases.add(u));s.entities.cities.forEach(c=>cities.add(c));if((s.risk_factors||[]).some(f=>f.includes('утечку')))leak=true;maxr=Math.max(maxr,s.risk_score);});
  rpanel.innerHTML=`<div class="scoreflag" style="color:${riskCol(maxr)}">${maxr}<span style="font-size:12px;color:var(--muted);font-weight:500"> / 100 · КЕЙС</span></div>
    <div class="det-h">🕸️ Организованная сеть · ${cities.size>1?[...cities].join('/'):[...cities][0]}</div>
    <div class="det-sub">${sigs.length} связанных сигналов на ${new Set(sigs.map(s=>s.source)).size} площадках</div>
    <div class="note red">Один оператор под <b>${aliases.size}</b> масками, связан <b>общим крипто-кошельком</b> и <b>телефоном</b> через Telegram, даркнет-форум и канал-прикрытие.${leak?' Использует <b>утёкшую базу ПДн РК</b> для таргетинга.':''}</div>
    <div class="sec">Финансовый след</div>${[...wallets].map(w=>`<div class="kv"><div class="k">💰 кошелёк</div><div class="vv" style="color:#9a6700">${w}</div></div>`).join('')}
    <div class="sec">Идентификаторы-мосты</div>${[...phones].map(p=>`<span class="pill" style="color:#7c3aed">📞 ${p}</span>`).join('')}${[...aliases].map(a=>`<span class="pill" style="color:#0e8a9b">${a}</span>`).join('')}
    <div class="sec">Сигналы сети</div><div class="connlist">${sigs.sort((a,b)=>b.risk_score-a.risk_score).map(s=>{const c=CAT[s.entities.product_category]||{ic:'❓'};return `<div class="ci" data-id="${s.id}"><span class="score" style="font-size:13px;color:${riskCol(s.risk_score)}">${s.risk_score}</span><span>${c.ic} ${s.source_name}</span></div>`;}).join('')}</div>
    ${decoderHTML()}`;
  rpanel.querySelectorAll('.ci').forEach(el=>el.onclick=()=>selectSignal(el.dataset.id)); bindDecoder();
}

const SLANG=[
  [/(меф|мяу|мука|соль|кристал|скорост|амф|фен|альфа)/i,'drugs','синтетические наркотики (мефедрон/амфетамин)'],
  [/(шишк|бошк|трав|гашиш|план|каннаб|марихуан|042?0)/i,'drugs','каннабис'],
  [/(экстаз|мдма|колес|таблы)/i,'drugs','MDMA/экстази'],
  [/(клад|прикоп|закладк|тайник)/i,'drugs','доставка закладкой (dead-drop)'],
  [/(дроп|обнал|залив|кэшаут|вывод нал)/i,'money_mule','дропы / отмывание денег'],
  [/(вейп|электронк|эльф|elf|под|жижа)/i,'vapes','вейпы / электронные сигареты'],
  [/(пробив|иин|база|детализац|прозвон|дамп|leak|слив)/i,'pii_leak','утечка ПДн / пробив'],
  [/(ствол|пистолет|\bпм\b|\bтт\b|травмат|глушак|патрон|оружи)/i,'weapons','оружие'],
  [/(без акциз|контрабанд|левый|реплик|копи[яи] 1:1|подделк|фальсиф)/i,'counterfeit','контрафакт / контрабанда'],
  [/(спирт|самогон|водк|коньяк|алко|виски)/i,'alcohol','нелегальный алкоголь']
];
const CITIES=['Алмат','Алмата','Astana','Астана','Шымкент','Караганд','Актобе','Тараз','Павлодар','Атырау','Костанай','Усть-Камен','Семей','Актау','Уральск'];
function runDecode(){
  const t=(document.getElementById('dec-in').value||'').trim(); const out=document.getElementById('dec-out');
  if(!t){out.innerHTML='<div style="color:var(--muted);font-size:11px;margin-top:8px">Вставь текст объявления выше.</div>';return;}
  const wallets=[...t.matchAll(/\bT[1-9A-HJ-NP-Za-km-z]{33}\b/g)].map(m=>['TRON',m[0]]).concat([...t.matchAll(/\b(?:bc1|[13])[a-zA-HJ-NP-Z0-9]{25,39}\b/g)].map(m=>['BTC',m[0]])).concat([...t.matchAll(/\b0x[a-fA-F0-9]{40}\b/g)].map(m=>['ETH',m[0]]));
  const phones=[...t.matchAll(/\+?7\d{10}/g)].map(m=>m[0]);
  const users=[...t.matchAll(/@[A-Za-z0-9_]{3,}/g)].map(m=>m[0]);
  const prices=[...t.matchAll(/(\d[\d\s]{0,7})\s*(к|k|тыс|тг|₸|тенге)/gi)].map(m=>{let n=parseFloat(m[1].replace(/\s/g,''));if(/к|k|тыс/i.test(m[2]))n*=1000;return Math.round(n);});
  const cities=CITIES.filter(c=>new RegExp(c,'i').test(t)).map(c=>c.replace(/Алмат\b/,'Алматы').replace('Алмата','Алматы').replace('Astana','Астана').replace('Караганд','Караганда').replace('Усть-Камен','Усть-Каменогорск'));
  let cat=null,prod=[]; SLANG.forEach(([re,c,label])=>{if(re.test(t)){if(!cat)cat=c;prod.push(label);}});
  const dead=/(клад|прикоп|координат|тайник)/i.test(t), minors=/(школьник|школ|подрост|несовершен)/i.test(t);
  const c=CAT[cat]||{ic:'❓',ru:'не определено',col:'#888'};
  const risk=Math.min(99,(cat==='drugs'||cat==='weapons'||cat==='pii_leak'?70:cat==='money_mule'?55:35)+(wallets.length?12:0)+(dead?8:0)+(minors?6:0)+(phones.length&&users.length?4:0));
  const chip=(l,v)=>v?`<div class="chip"><b>${l}</b> ${v}</div>`:'';
  out.innerHTML=`<div style="margin-top:12px;display:flex;align-items:center;gap:8px"><span class="score" style="font-size:18px;color:${riskCol(risk)}">${risk}</span><span class="badge" style="border-color:${c.col}55;color:${c.col}">${c.ic} ${c.ru}</span><span style="font-size:10px;color:var(--ok);margin-left:auto">✓ локально</span></div>
    <div style="font-size:11.5px;color:var(--ink-2);margin:8px 0;line-height:1.5">${prod.length?('Распознано: <b style="color:var(--ink)">'+[...new Set(prod)].join(', ')+'</b>. '):''}${dead?'Способ — закладка. ':''}${minors?'⚠️ таргет на несовершеннолетних. ':''}</div>
    <div>${chip('💰',wallets.map(w=>w[0]+' '+w[1].slice(0,6)+'…'+w[1].slice(-4)).join(' '))}${chip('📞',phones.join(' '))}${chip('👤',users.join(' '))}${chip('🏙️',[...new Set(cities)].join(' '))}${chip('💵',prices.length?[...new Set(prices)].map(p=>p.toLocaleString('ru')+'₸').join(' / '):'')}</div>
    ${wallets.length?`<div style="font-size:10.5px;color:#9a6700;margin-top:8px;line-height:1.5">↳ кошелёк добавлен в граф «следуй за деньгами» — проверяется пересечение с известными кластерами.</div>`:''}`;
}

let dragNode=null,dragMoved=false,panning=false,panStart=null;
function svgPt(ev){const r=svg.getBoundingClientRect();return{x:view.x+(ev.clientX-r.left)/r.width*(W/view.k),y:view.y+(ev.clientY-r.top)/r.height*(H/view.k)};}
function startDragNode(ev){ev.stopPropagation();dragMoved=false;dragNode=NODE[ev.currentTarget.dataset.id];}
wrap.addEventListener('mousedown',ev=>{if(!dragNode){panning=true;wrap.classList.add('grabbing');panStart={x:ev.clientX,y:ev.clientY,vx:view.x,vy:view.y};}});
window.addEventListener('mousemove',ev=>{if(dragNode){const p=svgPt(ev);dragNode.x=p.x;dragNode.y=p.y;dragMoved=true;render();}else if(panning){const r=svg.getBoundingClientRect();view.x=panStart.vx-(ev.clientX-panStart.x)/r.width*(W/view.k);view.y=panStart.vy-(ev.clientY-panStart.y)/r.height*(H/view.k);applyView();}});
window.addEventListener('mouseup',()=>{dragNode=null;panning=false;wrap.classList.remove('grabbing');setTimeout(()=>dragMoved=false,30);});
wrap.addEventListener('wheel',ev=>{ev.preventDefault();const f=ev.deltaY<0?1.12:0.89;const p=svgPt(ev);view.k=Math.max(.5,Math.min(3,view.k*f));view.x=p.x-(p.x-view.x)/f;view.y=p.y-(p.y-view.y)/f;applyView();},{passive:false});

document.getElementById('legend').innerHTML=Object.entries(NTYPE).map(([k,v])=>`<span><i style="background:${v.col}"></i>${v.ru}</span>`).join('')+`<span><i style="background:#c2384a"></i>высокий риск</span><span style="color:var(--risk)">— — ссылка на утечку</span>`;
document.getElementById('case1').onclick=()=>showCluster('sig-001');
document.getElementById('reset').onclick=()=>{selected=null;highlight=null;view={x:0,y:0,k:1};applyView();render();rpanel.innerHTML=`<div class="empty">Выбери кейс слева или узел на графе.<br><br>Снизу — <b style="color:var(--accent-deep)">живой декодер</b>: вставь сырое объявление, система разберёт сленг.</div>`+decoderHTML();bindDecoder();};

renderFeed(); render();
rpanel.innerHTML=`<div class="empty">Выбери кейс слева или узел на графе.<br><br>Снизу — <b style="color:var(--accent-deep)">живой декодер</b>: вставь сырое объявление, система разберёт сленг.</div>`+decoderHTML();
bindDecoder();
</script>
</body>
